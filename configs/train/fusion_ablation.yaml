defaults:
  - ../base

training:
  type: fusion_ablation
  epochs: 20
  batch_size: 32
  gradient_accumulation_steps: 2
  effective_batch_size: 64
  learning_rate: 5.0e-4
  warmup_ratio: 0.1
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  max_grad_norm: 1.0
  fp16: true
  output_dir: models/checkpoints/fusion_ablation
  save_strategy: steps
  save_steps: 500
  logging_steps: 50
  eval_steps: 250

model:
  vision_backbone: openai/clip-vit-base-patch16
  vision_dim: 512
  text_backbone: roberta-base
  text_dim: 768
  fusion: cross_attention
  cross_attention:
    num_layers: 4
    num_heads: 8
    hidden_dim: 768
  num_labels: 2
  dropout: 0.1

data:
  dataset: hateful_memes
  image_size: 224
  max_text_length: 77
