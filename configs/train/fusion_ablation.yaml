defaults:
  - ../base

training:
  type: fusion_ablation
  epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 4
  effective_batch_size: 64
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler: cosine
  max_grad_norm: 1.0
  bf16: true
  output_dir: models/checkpoints/fusion_ablation
  save_strategy: steps
  save_steps: 500
  logging_steps: 50
  eval_steps: 250

model:
  vision_backbone: openai/clip-vit-large-patch14
  text_backbone: roberta-base
  fusion: cross_attention
  cross_attention:
    num_layers: 4
    num_heads: 8
    hidden_dim: 768
  num_labels: 2
  dropout: 0.1

data:
  dataset: hateful_memes
  image_size: 224
  max_text_length: 128
