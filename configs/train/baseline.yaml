defaults:
  - ../base

training:
  type: baseline
  epochs: 10
  batch_size: 32
  gradient_accumulation_steps: 2
  effective_batch_size: 64
  learning_rate: 1.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler: cosine
  max_grad_norm: 1.0
  bf16: true
  output_dir: models/checkpoints/baseline
  save_strategy: steps
  save_steps: 500
  logging_steps: 50
  eval_steps: 250

model:
  vision_backbone: openai/clip-vit-large-patch14
  text_backbone: roberta-base
  fusion: late_fusion
  num_labels: 2
  dropout: 0.1

data:
  dataset: hateful_memes
  image_size: 224
  max_text_length: 128
  train_split: train
  val_split: dev
  test_split: test
