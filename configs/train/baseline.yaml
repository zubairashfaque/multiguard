defaults:
  - ../base

training:
  type: baseline
  epochs: 15
  batch_size: 4
  gradient_accumulation_steps: 16
  effective_batch_size: 64
  learning_rate: 1.0e-3
  warmup_ratio: 0.1
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  max_grad_norm: 1.0
  fp16: true
  output_dir: models/checkpoints/baseline
  save_strategy: steps
  save_steps: 500
  logging_steps: 50
  eval_steps: 250

model:
  vision_backbone: openai/clip-vit-base-patch16
  vision_dim: 512
  text_backbone: roberta-base
  text_dim: 768
  fusion: late_fusion
  num_labels: 2
  dropout: 0.1
  freeze_backbones: true

data:
  dataset: hateful_memes
  image_size: 224
  max_text_length: 77
  train_split: train
  val_split: dev
  test_split: test
