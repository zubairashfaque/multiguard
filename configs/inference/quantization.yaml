onnx:
  source_model: models/final/best_fusion
  output_dir: models/exported/onnx
  opset_version: 17
  dynamic_axes:
    pixel_values: {0: batch_size}
    input_ids: {0: batch_size, 1: sequence}
    attention_mask: {0: batch_size, 1: sequence}

quantization:
  dynamic:
    enabled: true
    dtype: int8
  static:
    enabled: false
    calibration_dataset: data/processed/val
    num_samples: 256

torchscript:
  enabled: false
  output_dir: models/exported/torchscript
